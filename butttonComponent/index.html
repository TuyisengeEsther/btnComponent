<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Component</title>

    
     <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet"> 

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="column">
        <h3>Default</h3>

        <button class="btn btn-primary">
            Explore products
            <i class="ri-arrow-right-line"></i>
        </button>

        <button class="btn btn-secondary">
            Explore products
            <i class="ri-arrow-right-line"></i>
        </button>

        <button class="btn btn-danger">
            <i class="ri-delete-bin-line"></i>
            Remove item
        </button>
    </div>


    <div class="column">
        <h3>Hover</h3>

        <button class="btn btn-primary hover-state">
            Explore products
            <i class="ri-arrow-right-line"></i>
        </button>

        <button class="btn btn-secondary hover-state">
            Explore products
            <i class="ri-arrow-right-line"></i>
        </button>

        <button class="btn btn-danger hover-state">
            <i class="ri-delete-bin-line"></i>
            Remove item
        </button>
    </div>


    <div class="column">
        <h3>Focused</h3>

        <button class="btn btn-primary focus-state">
            Explore products
            <i class="ri-arrow-right-line"></i>
        </button>

        <button class="btn btn-secondary focus-state">
            Explore products
            <i class="ri-arrow-right-line"></i>
        </button>

        <button class="btn btn-danger focus-state">
            <i class="ri-delete-bin-line"></i>
            Remove item
        </button>
    </div>

</div>

</body>
</html>
